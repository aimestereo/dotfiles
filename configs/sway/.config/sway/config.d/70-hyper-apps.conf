# Hyper-chord (CapsLock) named-workspace launchers.
# Each binding switches to the app's workspace and summons it if the
# workspace has no matching window; pressing again toggles back.
#
# Match patterns are the app's real Wayland app_id (or XWayland class), captured
# from `swaymsg -t get_tree`. A mismatch makes the toggle think the app is absent
# and re-launch on every press — invisible for apps that just refocus (Slack),
# but Geary/Obsidian/Chromium open a second window, so the patterns must be exact.
#
# Hyper+d launches ghostty with a dedicated app_id (com.mitchellh.ghostty.term)
# so the for_window rule can pull it onto the term workspace no matter where it
# first maps — fixes the race where the terminal appeared on the previous
# workspace before focus moved. $mod+Return terminals keep the default ghostty
# app_id (no rule) and stay where they open. --gtk-single-instance=false forces
# a fresh process so --class actually takes effect.
#
# Hyper+e (yazi) is the deliberate exception: a plain ghostty in the current
# workspace, no toggle, no for_window rule. yazi runs inside the tools toolbox
# (where the CLI stack lives) via the host->toolbox toolbox-run wrapper.
#
# Hyper+m (Yandex Music) is a Chromium --app web-app: Firefox-based Zen can't
# set a per-site app_id on Wayland. Chromium auto-derives a stable per-URL
# app_id (chrome-music.yandex.ru__-Default) that the toggle + for_window rule
# match on. See utils/install-flatpaks. Obsidian runs under XWayland, so it
# matches on class=obsidian (its app_id is empty).
#
# Hyper+backslash (1password) launches the native `1password` binary — a Tier-1
# rpm-ostree package layered by workstation-bootstrap/fedora-bootstrap.sh, not a
# flatpak (window app_id is `1password`). Its workspace is named `vault`, not a
# digit-leading name: sway derives a workspace's number from a leading digit, so
# a workspace called `1password` would alias workspace number 1 and collide with
# `$hyper+1` (see 71-hyper-workspaces.conf). Hyper+l is localsend (flatpak
# org.localsend.localsend_app, app_id localsend).

for_window [app_id="^com\.slack\.Slack$"]                  move container to workspace slack
for_window [class="^Slack"]                                move container to workspace slack
for_window [app_id="^us\.zoom\.Zoom$"]                     move container to workspace zoom
for_window [class="^[Zz]oom"]                              move container to workspace zoom
for_window [app_id="^app\.zen_browser\.zen$"]              move container to workspace browser
for_window [app_id="^geary$"]                              move container to workspace mail
for_window [app_id="^org\.gnome\.Calendar$"]               move container to workspace calendar
for_window [class="^obsidian$"]                            move container to workspace obsidian
for_window [app_id="^chrome-music\.yandex\.ru__-Default$"] move container to workspace music
for_window [app_id="^com\.mitchellh\.ghostty\.term$"]      move container to workspace term
for_window [app_id="^1password$"]                          move container to workspace vault
for_window [app_id="^localsend$"]                          move container to workspace localsend

bindsym $hyper+a exec $HOME/.local/bin/hyper-app-toggle browser  '^app\.zen_browser\.zen$'               flatpak run app.zen_browser.zen
bindsym $hyper+c exec $HOME/.local/bin/hyper-app-toggle calendar '^org\.gnome\.Calendar$'                flatpak run org.gnome.Calendar
bindsym $hyper+d exec $HOME/.local/bin/hyper-app-toggle term     '^com\.mitchellh\.ghostty\.term$'       ghostty --gtk-single-instance=false --class=com.mitchellh.ghostty.term
bindsym $hyper+e exec ghostty -e $HOME/.local/bin/toolbox-run yazi
bindsym $hyper+i exec $HOME/.local/bin/hyper-app-toggle mail      '^geary$'                               flatpak run org.gnome.Geary
bindsym $hyper+l exec $HOME/.local/bin/hyper-app-toggle localsend '^localsend$'                           flatpak run org.localsend.localsend_app
bindsym $hyper+m exec $HOME/.local/bin/hyper-app-toggle music    '^chrome-music\.yandex\.ru__-Default$'  flatpak run org.chromium.Chromium --app=https://music.yandex.ru
bindsym $hyper+o exec $HOME/.local/bin/hyper-app-toggle obsidian '^obsidian$'                            flatpak run md.obsidian.Obsidian
bindsym $hyper+s exec $HOME/.local/bin/hyper-app-toggle slack    '^(com\.slack\.Slack|Slack)'            flatpak run com.slack.Slack
bindsym $hyper+z exec $HOME/.local/bin/hyper-app-toggle zoom     '^(us\.zoom\.Zoom|[Zz]oom)'             flatpak run us.zoom.Zoom
bindsym $hyper+backslash exec $HOME/.local/bin/hyper-app-toggle vault '^1password$'                       1password
