# Theme bindings
# Opens an interactive theme-bg-set picker in a one-shot ghostty window.
# Routed through toolbox-run so the picker has fd / fzf / chafa on PATH;
# theme-bg-set itself stays context-agnostic. Absolute paths because sway's
# `exec` spawns a non-login bash that doesn't pick up `~/.local/bin` from
# the user's interactive rc files.
bindsym $mod+Shift+b exec $term -e $HOME/.local/bin/toolbox-run $HOME/.local/bin/theme-bg-set
