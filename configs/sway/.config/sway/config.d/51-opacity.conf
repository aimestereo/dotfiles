# Window opacity — adjust the focused window's transparency.
# `opacity` is a built-in sway command, so bind it directly (no exec/swaymsg).
# Mirrors the brightness keys (50-brightness.conf): lower on the lower F-key.
bindsym $mod+F6 opacity minus 0.05
bindsym $mod+F7 opacity plus 0.05

# Same step, but across every currently-open window. `[shell=".*"]` matches
# both xdg_shell and xwayland. One-shot: windows opened later stay opaque.
bindsym $mod+Shift+F6 [shell=".*"] opacity minus 0.05
bindsym $mod+Shift+F7 [shell=".*"] opacity plus 0.05
