# Notifications — mako replaces the base image's dunst. exec at session start so
# mako claims org.freedesktop.Notifications before dunst's lazy D-Bus activation
# can fire; dunst is also masked in utils/fedora-after-install.
exec mako

# do-not-disturb toggle (mako's [mode=do-not-disturb] rules live in
# ~/.config/mako/config). Hyper = Mod1+Mod4+Ctrl+Shift.
bindsym $hyper+n exec makoctl mode -t do-not-disturb
