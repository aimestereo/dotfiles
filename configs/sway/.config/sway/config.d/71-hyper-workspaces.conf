# Hyper+<number> mirrors the $mod+<number> workspace switches in the main config
# (### Workspaces block), so numbered workspaces are reachable one-handed from
# the CapsLock Hyper chord. Switch-only by request — no move-container bindings.
#
# These share the same numbered workspaces as $mod+<number>; both chords land on
# the same target. Named app workspaces (slack, mail, vault, …) deliberately
# avoid digit-leading names: sway derives a workspace's number from a leading
# digit, so a workspace named e.g. `1password` would alias number 1 and collide
# with $hyper+1. See 70-hyper-apps.conf.

bindsym $hyper+1 workspace number 1
bindsym $hyper+2 workspace number 2
bindsym $hyper+3 workspace number 3
bindsym $hyper+4 workspace number 4
bindsym $hyper+5 workspace number 5
bindsym $hyper+6 workspace number 6
bindsym $hyper+7 workspace number 7
bindsym $hyper+8 workspace number 8
bindsym $hyper+9 workspace number 9
bindsym $hyper+0 workspace number 10
