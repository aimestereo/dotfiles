# Overrides /usr/share/sway/config.d/20-swayidle.conf
# - 15 min lock timeout (was 5 min)
# - Lock background = current-background-image symlink (retargeted by theme-bg-set)
# - exec_always + pkill guard inside swayidle-restart so `swaymsg reload`
#   after `make fedora` refreshes timeouts/args without a relogin.
exec_always $HOME/.local/bin/swayidle-restart
