#? Minimal btop override.
#?
#? `color_theme = "current"` points btop at ~/.config/btop/themes/current.theme,
#? which `utils/theme-bootstrap` symlinks to ~/.config/theme/current/btop.theme
#? so the active theme tracks `theme-set`. `theme-set` sends SIGUSR2 to live-
#? reload running btop instances. All other settings fall back to btop's
#? built-in defaults — keeping this file short avoids drift vs. upstream.
#?
#? save_config_on_exit = False is load-bearing: by default btop rewrites this
#? file on every exit (a full 250-line generated config), and because the
#? stow-managed `~/.config/btop/btop.conf` is a symlink into the dotfiles repo,
#? the writeback would clobber the tracked file. Disabling save-on-exit keeps
#? this short override authoritative.

color_theme = "current"
theme_background = False
save_config_on_exit = False
