# CapsLock → Hyper (Meta+Ctrl+Alt+Shift) — mirrors Mac Karabiner quad mode.
#
# keyd requires a named layer with modifier inheritance for this; plus-joined
# keys are not valid as a top-level [main] action.
#
# fedora-after-install copies this file to /etc/keyd/default.conf and
# (re)starts the keyd service.

[ids]
*

[main]
capslock = layer(hyper)

[hyper:M-C-A-S]
