# CapsLock → Hyper (Cmd+Ctrl+Alt+Shift) — mirrors macOS Karabiner quad mode.
# Sway / the WM binds Mod1+Mod4+Ctrl+Shift+<key> to consume the chord.
#
# fedora-after-install copies this file to /etc/keyd/default.conf and
# (re)starts the keyd service.

[ids]
*

[main]
capslock = leftmeta+leftcontrol+leftalt+leftshift
