# wt switch --create <feature>
#
# override the default post-create and pre-remove hooks to create a tmux session for each worktree, and kill it when the worktree is removed.
# wt switch --create <feature> -x 'tmux switch-client -t <session>'

[pre-start]
tmux = """
W="{{ worktree_path }}"
G=$(basename "$(dirname "$W")")
P=$(basename "$W")
S=$(echo "${P}[${G}]" | tr . _)

if tmux has-session -t "$S" 2>/dev/null; then
    tmux switch-client -t "$S"
    exit 0
fi

tmux new-session -d -s "$S" -c "$W" -n nvim
tmux new-window -t "$S" -c "$W" -n claude
tmux new-window -t "$S" -c "$W" -n shell

sleep 3

tmux send-keys -t "$S:nvim" 'nvim' Enter
tmux send-keys -t "$S:claude" 'claude --dangerously-skip-permissions' Enter

tmux select-window -t "$S:nvim"
tmux switch-client -t "$S"
"""

[pre-remove]
tmux = """
W="{{ worktree_path }}"
G=$(basename "$(dirname "$W")")
P=$(basename "$W")
S=$(echo "${P}[${G}]" | tr . _)
tmux kill-session -t "$S" 2>/dev/null || true
"""
